name: SonarQube Analysis

# Independent del workflow "Coverage": mateixes ramificacions (push/PR) però sense esperar-lo ni descarregar artifacts.
# Les propietats LCOV de sonar-project.properties s'anul·len aquí perquè l'anàlisi no depengui de fitxers generats per tests.
on:
  push:
    branches: ["development", "sonarqube1", "main"]
  pull_request:
    branches: ["development", "sonarqube1", "main"]
  workflow_dispatch:

jobs:
  sonarqube:
    name: Analitzar amb SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codi
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Anàlisi amb SonarCloud
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.javascript.lcov.reportPaths=
            -Dsonar.typescript.lcov.reportPaths=
