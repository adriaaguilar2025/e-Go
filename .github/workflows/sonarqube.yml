name: SonarQube Analysis

# Independent del workflow "Coverage": s'executa en push/PR sense esperar-lo ni descarregar artifacts.
# Mentre no hi hagi fitxers LCOV al repositori en aquest job, Sonar analitzarà codi però sense mètriques de cobertura.
on:
  push:
    branches: ["development", "sonarqube1", "main"]
  pull_request:
    branches: ["development", "sonarqube1", "main"]
  workflow_dispatch:

jobs:
  sonarqube:
    name: Analitzar amb SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codi
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Anàlisi amb SonarCloud
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectBaseDir: .
